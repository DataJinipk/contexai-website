name: smoke
on:
  push:
    branches: [main]
  schedule:
    - cron: '0 */6 * * *'   # every 6 hours — catches drift, expired certs, broken edges
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: Wait 60s for Cloudflare cache propagation (push events only)
        if: github.event_name == 'push'
        run: sleep 60
      - name: Run smoke test against production
        run: node scripts/smoke.mjs https://contexai.org
