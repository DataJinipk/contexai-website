<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1200px;height:630px;overflow:hidden}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#0A2540;color:#fff;position:relative}
.cbar{position:absolute;top:0;left:0;width:100%;height:8px;display:flex;z-index:6}
.cbar span{flex:1}
.cbar span:nth-child(1){background:#6E5C9C}.cbar span:nth-child(2){background:#4D95D1}.cbar span:nth-child(3){background:#5D9ED5}.cbar span:nth-child(4){background:#E58940}.cbar span:nth-child(5){background:#DF6F18}
.grid{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.03) 1px,transparent 1px);background-size:48px 48px}
.glow{position:absolute;width:760px;height:760px;border-radius:50%;background:radial-gradient(circle,rgba(223,111,24,.16),transparent 65%);top:-160px;right:-160px}
.wrap{position:absolute;inset:0;padding:62px 72px;display:flex;flex-direction:column;justify-content:space-between}
.top{display:flex;align-items:center;justify-content:space-between}
.logo{font-weight:800;font-size:30px;letter-spacing:-.02em}
.logo span{color:#00B1FF}
.tag{font-size:15px;font-weight:700;letter-spacing:.16em;color:#9AAAC4;border:1px solid rgba(255,255,255,.16);padding:8px 16px;border-radius:100px}
.mid{display:flex;align-items:center;gap:44px}
.copy{flex:1}
.h{font-family:Georgia,'Times New Roman',serif;font-size:56px;line-height:1.05;letter-spacing:-.02em;margin-bottom:22px}
.h em{font-style:italic;color:#5D9ED5}
.sub{font-size:23px;line-height:1.5;color:#AEBBD4;max-width:560px;font-weight:300}
.art{width:320px;flex-shrink:0;display:flex;flex-direction:column;gap:13px}
.rbar{display:flex;align-items:center;gap:14px}
.rbar .n{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800;color:#0A2540;flex-shrink:0}
.rbar .b{height:14px;border-radius:8px;flex:1}
.bot{display:flex;align-items:center;justify-content:space-between;border-top:1px solid rgba(255,255,255,.12);padding-top:22px}
.pills{display:flex;gap:10px}
.pill{font-size:16px;color:#cdd7ea;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);padding:9px 18px;border-radius:100px}
.url{font-size:18px;color:#7E8DA8;font-weight:600}
</style></head>
<body>
<div class="cbar"><span></span><span></span><span></span><span></span><span></span></div>
<div class="grid"></div><div class="glow"></div>
<div class="wrap">
  <div class="top"><div class="logo">Contex<span>Ai</span> Group</div><div class="tag">PPP · INFRASTRUCTURE</div></div>
  <div class="mid">
    <div class="copy">
      <div class="h">Why most PPP bids<br>fail the <em>bankability test</em></div>
      <div class="sub">Five reasons projects die at financial close — and how to de-risk each before you bid.</div>
    </div>
    <div class="art">
      <div class="rbar"><div class="n" style="background:#6E5C9C">1</div><div class="b" style="background:#6E5C9C;width:100%"></div></div>
      <div class="rbar"><div class="n" style="background:#4D95D1">2</div><div class="b" style="background:#4D95D1;width:88%"></div></div>
      <div class="rbar"><div class="n" style="background:#5D9ED5">3</div><div class="b" style="background:#5D9ED5;width:76%"></div></div>
      <div class="rbar"><div class="n" style="background:#E58940">4</div><div class="b" style="background:#E58940;width:64%"></div></div>
      <div class="rbar"><div class="n" style="background:#DF6F18">5</div><div class="b" style="background:#DF6F18;width:52%"></div></div>
    </div>
  </div>
  <div class="bot">
    <div class="pills"><div class="pill">Project Finance</div><div class="pill">Risk Allocation</div><div class="pill">Advisory</div></div>
    <div class="url">contexai.org</div>
  </div>
</div>
</body></html>
