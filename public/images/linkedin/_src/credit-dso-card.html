<!DOCTYPE html>
<html><head>
<meta name="robots" content="noindex,nofollow"><meta charset="UTF-8">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1200px;height:630px;overflow:hidden}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#0A2540;color:#fff;position:relative}
.cbar{position:absolute;top:0;left:0;width:100%;height:8px;display:flex;z-index:6}
.cbar span{flex:1}
.cbar span:nth-child(1){background:#6E5C9C}.cbar span:nth-child(2){background:#4D95D1}.cbar span:nth-child(3){background:#5D9ED5}.cbar span:nth-child(4){background:#E58940}.cbar span:nth-child(5){background:#DF6F18}
.grid{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.03) 1px,transparent 1px);background-size:48px 48px}
.glow{position:absolute;width:760px;height:760px;border-radius:50%;background:radial-gradient(circle,rgba(223,111,24,.16),transparent 65%);top:-160px;right:-160px}
.wrap{position:absolute;inset:0;padding:62px 72px;display:flex;flex-direction:column;justify-content:space-between}
.top{display:flex;align-items:center;justify-content:space-between}
.logo{font-weight:800;font-size:30px;letter-spacing:-.02em}
.logo span{color:#00B1FF}
.tag{font-size:15px;font-weight:700;letter-spacing:.16em;color:#9AAAC4;border:1px solid rgba(255,255,255,.16);padding:8px 16px;border-radius:100px}
.mid{display:flex;align-items:center;gap:44px}
.copy{flex:1}
.h{font-family:Georgia,'Times New Roman',serif;font-size:54px;line-height:1.06;letter-spacing:-.02em;margin-bottom:22px}
.h em{font-style:italic;color:#4D95D1}
.sub{font-size:23px;line-height:1.5;color:#AEBBD4;max-width:540px;font-weight:300}
.art{width:330px;flex-shrink:0}
.chart{position:relative;height:230px;border-left:2px solid rgba(255,255,255,.18);border-bottom:2px solid rgba(255,255,255,.18);display:flex;align-items:flex-end;gap:18px;padding:0 12px 0 18px}
.col{flex:1;border-radius:6px 6px 0 0;position:relative}
.col span{position:absolute;top:-26px;left:0;right:0;text-align:center;font-size:15px;font-weight:700;color:#cdd7ea}
.lbl{margin-top:12px;font-size:15px;color:#7E8DA8;text-align:center;letter-spacing:.12em;font-weight:700}
.bot{display:flex;align-items:center;justify-content:space-between;border-top:1px solid rgba(255,255,255,.12);padding-top:22px}
.pills{display:flex;gap:10px}
.pill{font-size:16px;color:#cdd7ea;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);padding:9px 18px;border-radius:100px}
.url{font-size:18px;color:#7E8DA8;font-weight:600}
</style></head>
<body>
<div class="cbar"><span></span><span></span><span></span><span></span><span></span></div>
<div class="grid"></div><div class="glow"></div>
<div class="wrap">
  <div class="top"><div class="logo">Contex<span>Ai</span> Group</div><div class="tag">CREDIT · WORKING CAPITAL</div></div>
  <div class="mid">
    <div class="copy">
      <div class="h">Rising DSO is never<br>just a <em>collections</em> problem</div>
      <div class="sub">When days-sales-outstanding creeps up, the cause usually sits upstream of the AR team.</div>
    </div>
    <div class="art">
      <div class="chart">
        <div class="col" style="height:42%;background:#4D95D1"><span>38</span></div>
        <div class="col" style="height:55%;background:#5D9ED5"><span>47</span></div>
        <div class="col" style="height:72%;background:#E58940"><span>61</span></div>
        <div class="col" style="height:92%;background:#DF6F18"><span>78</span></div>
      </div>
      <div class="lbl">DSO · DAYS &nbsp;→&nbsp; TRENDING UP</div>
    </div>
  </div>
  <div class="bot">
    <div class="pills"><div class="pill">Credit Risk</div><div class="pill">Cash Flow</div><div class="pill">Advisory</div></div>
    <div class="url">contexai.org</div>
  </div>
</div>
</body></html>
