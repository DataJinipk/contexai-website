<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1200px;height:630px;overflow:hidden}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#0A3E40;color:#fff;position:relative}
.cbar{position:absolute;top:0;left:0;width:100%;height:8px;display:flex;z-index:6}
.cbar span{flex:1}
.cbar span:nth-child(1){background:#00BCD4}.cbar span:nth-child(2){background:#14B8A6}.cbar span:nth-child(3){background:#AEEA00}.cbar span:nth-child(4){background:#FDD835}.cbar span:nth-child(5){background:#F26122}
.grid{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.03) 1px,transparent 1px);background-size:48px 48px}
.glow{position:absolute;width:760px;height:760px;border-radius:50%;background:radial-gradient(circle,rgba(20,184,166,.20),transparent 65%);top:-160px;right:-160px}
.wrap{position:absolute;inset:0;padding:62px 72px;display:flex;flex-direction:column;justify-content:space-between}
.top{display:flex;align-items:center;justify-content:space-between}
.logo{font-weight:800;font-size:30px;letter-spacing:-.02em}
.logo span{color:#2DD4BF}
.tag{font-size:15px;font-weight:700;letter-spacing:.22em;color:#9AAAC4;border:1px solid rgba(255,255,255,.16);padding:8px 16px;border-radius:100px}
.mid{display:flex;align-items:center;gap:40px}
.copy{flex:1}
.h{font-family:Georgia,'Times New Roman',serif;font-size:62px;line-height:1.04;letter-spacing:-.02em;margin-bottom:22px}
.h em{font-style:italic;color:#AEEA00}
.sub{font-size:23px;line-height:1.5;color:#AEBBD4;max-width:560px;font-weight:300}
.art{width:300px;height:300px;flex-shrink:0}
.bot{display:flex;align-items:center;justify-content:space-between;border-top:1px solid rgba(255,255,255,.12);padding-top:22px}
.pills{display:flex;gap:10px}
.pill{font-size:16px;color:#cdd7ea;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);padding:9px 18px;border-radius:100px}
.url{font-size:18px;color:#7E8DA8;font-weight:600}
</style></head>
<body>
<div class="cbar"><span></span><span></span><span></span><span></span><span></span></div>
<div class="grid"></div><div class="glow"></div>
<div class="wrap">
  <div class="top"><div class="logo">Contex<span>Ai</span> Group</div><div class="tag">ENERGY · BANKABILITY</div></div>
  <div class="mid">
    <div class="copy">
      <div class="h">Solar is cheap<br>everywhere.<br><em>Bankability isn't.</em></div>
      <div class="sub">Offtake. Grid. Currency. The three things that actually decide whether a project gets financed.</div>
    </div>
    <svg class="art" viewBox="0 0 300 300" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="150" cy="96" r="46" fill="none" stroke="#FDD835" stroke-width="4"/>
      <g stroke="#FDD835" stroke-width="4" stroke-linecap="round">
        <line x1="150" y1="20" x2="150" y2="36"/><line x1="150" y1="156" x2="150" y2="172"/>
        <line x1="74" y1="96" x2="90" y2="96"/><line x1="210" y1="96" x2="226" y2="96"/>
        <line x1="96" y1="42" x2="107" y2="53"/><line x1="193" y1="139" x2="204" y2="150"/>
        <line x1="204" y1="42" x2="193" y2="53"/><line x1="107" y1="139" x2="96" y2="150"/>
      </g>
      <rect x="40" y="210" width="44" height="60" rx="5" fill="rgba(20,184,166,.30)" stroke="#14B8A6" stroke-width="3"/>
      <rect x="98" y="184" width="44" height="86" rx="5" fill="rgba(174,234,0,.35)" stroke="#AEEA00" stroke-width="3"/>
      <rect x="156" y="160" width="44" height="110" rx="5" fill="rgba(253,216,53,.35)" stroke="#FDD835" stroke-width="3"/>
      <rect x="214" y="130" width="44" height="140" rx="5" fill="rgba(242,97,34,.45)" stroke="#F26122" stroke-width="3"/>
      <path d="M50 220 L120 196 L178 172 L236 142" stroke="#fff" stroke-width="3" stroke-linecap="round" fill="none" opacity=".7"/>
    </svg>
  </div>
  <div class="bot">
    <div class="pills"><div class="pill">Advisory</div><div class="pill">PPP &amp; Infrastructure</div><div class="pill">Agentic AI</div></div>
    <div class="url">contexai.org</div>
  </div>
</div>
</body></html>
