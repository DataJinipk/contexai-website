<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:300px;height:300px;overflow:hidden}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#0B1120;display:flex;align-items:center;justify-content:center;position:relative}
.glow{position:absolute;width:360px;height:360px;border-radius:50%;background:radial-gradient(circle,rgba(29,95,255,.30),transparent 62%);top:-90px;right:-90px}
.box{position:relative;text-align:center}
.mark{font-size:46px;font-weight:800;letter-spacing:-.02em;color:#fff;line-height:1}
.mark span{color:#00B1FF}
.sub{margin-top:12px;font-size:15px;font-weight:700;letter-spacing:.42em;color:#9AAAC4;padding-left:.42em}
.rule{width:54px;height:3px;background:#1D5FFF;border-radius:2px;margin:16px auto 0}
</style></head>
<body>
<div class="glow"></div>
<div class="box">
  <div class="mark">Contex<span>Ai</span></div>
  <div class="sub">GROUP</div>
  <div class="rule"></div>
</div>
</body></html>
