<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1200px;height:630px;overflow:hidden}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#0A3E40;color:#fff;position:relative}
.grid{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.03) 1px,transparent 1px);background-size:48px 48px}
.glow{position:absolute;width:820px;height:820px;border-radius:50%;background:radial-gradient(circle,rgba(20,184,166,.22),transparent 62%);top:50%;left:50%;transform:translate(-50%,-58%)}
.wrap{position:absolute;inset:0;padding:60px 72px;display:flex;flex-direction:column;justify-content:space-between;text-align:center;align-items:center}
.logo{font-size:30px;font-weight:800;letter-spacing:-.02em}
.logo span{color:#2DD4BF}
.mid{display:flex;flex-direction:column;align-items:center}
.kicker{font-size:16px;font-weight:700;letter-spacing:.28em;color:#9AAAC4;margin-bottom:18px;padding-left:.28em}
.h{font-family:Georgia,'Times New Roman',serif;font-size:74px;line-height:1.04;letter-spacing:-.02em;margin-bottom:22px}
.h em{font-style:italic;color:#2DD4BF}
.sub{font-size:23px;line-height:1.5;color:#AEBBD4;max-width:760px;font-weight:300}
.pills{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
.pill{font-size:16px;color:#cdd7ea;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);padding:9px 18px;border-radius:100px}
.url{font-size:18px;color:#7E8DA8;font-weight:600;margin-top:18px}
.bot{display:flex;flex-direction:column;align-items:center;gap:4px}
</style></head>
<body>
<div class="grid"></div><div class="glow"></div>
<div class="wrap">
  <div class="logo">Contex<span>Ai</span> Group</div>
  <div class="mid">
    <div class="kicker">INTRODUCING</div>
    <div class="h">Intelligence in <em>Context.</em></div>
    <div class="sub">A boutique advisory and a curated network of senior specialists — amplified by Agentic AI — serving Pakistan and emerging markets.</div>
  </div>
  <div class="bot">
    <div class="pills"><div class="pill">Advisory</div><div class="pill">Dispute Resolution</div><div class="pill">PPP &amp; Infrastructure</div><div class="pill">Energy</div><div class="pill">Agentic AI</div></div>
    <div class="url">contexai.org</div>
  </div>
</div>
</body></html>
