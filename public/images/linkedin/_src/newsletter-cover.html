<!DOCTYPE html>
<html><head>
<meta name="robots" content="noindex,nofollow"><meta charset="UTF-8">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1280px;height:720px;overflow:hidden}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#0B1120;color:#fff;position:relative}
.grid{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.03) 1px,transparent 1px);background-size:52px 52px}
.glow{position:absolute;width:900px;height:900px;border-radius:50%;background:radial-gradient(circle,rgba(124,58,237,.20),rgba(29,95,255,.12),transparent 64%);top:50%;left:50%;transform:translate(-50%,-56%)}
.net{position:absolute;inset:0;opacity:.5}
.wrap{position:absolute;inset:0;padding:64px 80px;display:flex;flex-direction:column;justify-content:space-between;align-items:center;text-align:center}
.top{display:flex;align-items:center;gap:16px}
.logo{font-size:30px;font-weight:800;letter-spacing:-.02em}
.logo span{color:#4F83FF}
.tagchip{font-size:14px;font-weight:700;letter-spacing:.24em;color:#9AAAC4;border:1px solid rgba(255,255,255,.16);padding:7px 15px;border-radius:100px}
.mid{display:flex;flex-direction:column;align-items:center}
.h{font-family:Georgia,'Times New Roman',serif;font-size:86px;line-height:1.02;letter-spacing:-.02em;margin-bottom:24px}
.h em{font-style:italic;color:#4F83FF}
.sub{font-size:25px;line-height:1.5;color:#AEBBD4;max-width:820px;font-weight:300}
.sub b{color:#fff;font-weight:600}
.bot{font-size:18px;color:#7E8DA8;font-weight:600;letter-spacing:.04em}
</style></head>
<body>
<div class="grid"></div><div class="glow"></div>
<svg class="net" viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg">
  <g stroke="rgba(79,131,255,.25)" stroke-width="1.5">
    <line x1="170" y1="180" x2="320" y2="300"/><line x1="320" y1="300" x2="210" y2="470"/>
    <line x1="320" y1="300" x2="470" y2="420"/><line x1="1090" y1="200" x2="970" y2="330"/>
    <line x1="970" y1="330" x2="1110" y2="470"/><line x1="970" y1="330" x2="820" y2="430"/>
  </g>
  <g fill="#4F83FF">
    <circle cx="170" cy="180" r="6"/><circle cx="320" cy="300" r="8"/><circle cx="210" cy="470" r="6"/>
    <circle cx="470" cy="420" r="5"/><circle cx="1090" cy="200" r="6"/><circle cx="970" cy="330" r="8"/>
    <circle cx="1110" cy="470" r="6"/><circle cx="820" cy="430" r="5"/>
  </g>
  <g fill="#00C4A7"><circle cx="320" cy="300" r="3"/><circle cx="970" cy="330" r="3"/></g>
</svg>
<div class="wrap">
  <div class="top"><div class="logo">Contex<span>Ai</span> Group</div><div class="tagchip">NEWSLETTER</div></div>
  <div class="mid">
    <div class="h">Intelligence in <em>Context</em></div>
    <div class="sub"><b>Agentic AI &amp; technology in real business</b> — from someone deploying it on live engagements, not narrating it from the sidelines.</div>
  </div>
  <div class="bot">Every two weeks&nbsp;&nbsp;·&nbsp;&nbsp;contexai.org</div>
</div>
</body></html>
