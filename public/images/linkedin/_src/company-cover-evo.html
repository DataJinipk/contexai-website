<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1128px;height:191px;overflow:hidden}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#0A2540;color:#fff;position:relative}
.bar{display:flex;height:7px;width:100%;position:absolute;top:0;left:0;z-index:5}
.bar span{flex:1}
.bar span:nth-child(1){background:#6E5C9C}.bar span:nth-child(2){background:#4D95D1}
.bar span:nth-child(3){background:#5D9ED5}.bar span:nth-child(4){background:#E58940}
.bar span:nth-child(5){background:#DF6F18}
.glow{position:absolute;width:560px;height:560px;border-radius:50%;background:radial-gradient(circle,rgba(39,119,193,.22),rgba(110,92,156,.12),transparent 62%);top:-230px;right:80px}
.gridbg{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.03) 1px,transparent 1px);background-size:42px 42px}
.wrap{position:absolute;inset:0;padding:0 56px;display:flex;align-items:center;justify-content:space-between;z-index:3}
.logo{font-size:31px;font-weight:800;letter-spacing:-.02em;color:#fff}
.logo span{color:#00B1FF}
.tag{font-size:15px;color:#C4D0E6;font-weight:300;margin-top:8px}
.tag b{color:#fff;font-weight:600}
.right{text-align:right}
.pills{display:flex;gap:8px;justify-content:flex-end;margin-bottom:9px}
.pill{font-size:12.5px;color:#dce4f2;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.16);padding:5px 12px;border-radius:100px}
.url{font-size:14px;color:#9fb0cc;font-weight:600}
</style></head>
<body>
<div class="glow"></div><div class="gridbg"></div>
<div class="bar"><span></span><span></span><span></span><span></span><span></span></div>
<div class="wrap">
  <div class="left">
    <div class="logo">Contex<span>Ai</span> Group</div>
    <div class="tag"><b>Consulting, powered by AI.</b> Strategic advisory + Agentic AI for Pakistan &amp; emerging markets.</div>
  </div>
  <div class="right">
    <div class="pills"><div class="pill">Advisory</div><div class="pill">Agentic AI</div><div class="pill">Finance</div></div>
    <div class="url">contexai.org</div>
  </div>
</div>
</body></html>
