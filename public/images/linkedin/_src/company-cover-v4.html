<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1128px;height:191px;overflow:hidden}
body{font-family:'Segoe UI',system-ui,sans-serif;position:relative;background:#0c1430}
.bg{position:absolute;inset:0;background:url('ai-consulting-raw.png') center 42% / cover no-repeat}
.shade{position:absolute;inset:0;background:linear-gradient(90deg,rgba(8,13,32,.94) 0%,rgba(8,13,32,.74) 34%,rgba(8,13,32,.30) 60%,rgba(8,13,32,.55) 100%)}
.wrap{position:absolute;inset:0;padding:0 56px;display:flex;align-items:center;justify-content:space-between;z-index:2}
.logo{font-size:31px;font-weight:800;letter-spacing:-.02em;color:#fff;text-shadow:0 2px 12px rgba(0,0,0,.55)}
.logo span{color:#6BA0FF}
.tag{font-size:15px;color:#E4EAF5;font-weight:300;margin-top:8px;text-shadow:0 1px 8px rgba(0,0,0,.65)}
.tag b{color:#fff;font-weight:600}
.right{text-align:right}
.pills{display:flex;gap:8px;justify-content:flex-end;margin-bottom:9px}
.pill{font-size:12.5px;color:#fff;background:rgba(255,255,255,.13);border:1px solid rgba(255,255,255,.24);padding:5px 12px;border-radius:100px;text-shadow:0 1px 6px rgba(0,0,0,.5)}
.url{font-size:14px;color:#E4EAF5;font-weight:600;text-shadow:0 1px 8px rgba(0,0,0,.7)}
</style></head>
<body>
<div class="bg"></div><div class="shade"></div>
<div class="wrap">
  <div class="left">
    <div class="logo">Contex<span>Ai</span> Group</div>
    <div class="tag"><b>Consulting, powered by AI.</b> Strategic advisory + Agentic AI for Pakistan &amp; emerging markets.</div>
  </div>
  <div class="right">
    <div class="pills"><div class="pill">Advisory</div><div class="pill">Agentic AI</div><div class="pill">Finance</div></div>
    <div class="url">contexai.org</div>
  </div>
</div>
</body></html>
