<!DOCTYPE html>
<html><head>
<meta name="robots" content="noindex,nofollow"><meta charset="UTF-8">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1128px;height:191px;overflow:hidden}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#0B1120;color:#fff;position:relative}
.grid{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.03) 1px,transparent 1px);background-size:40px 40px}
.glow{position:absolute;width:520px;height:520px;border-radius:50%;background:radial-gradient(circle,rgba(29,95,255,.22),transparent 60%);top:-220px;right:60px}
.wrap{position:absolute;inset:0;padding:0 56px;display:flex;align-items:center;justify-content:space-between}
.left .logo{font-size:30px;font-weight:800;letter-spacing:-.02em;margin-bottom:8px}
.left .logo span{color:#4F83FF}
.left .tag{font-size:16px;color:#AEBBD4;font-weight:300}
.left .tag b{color:#fff;font-weight:600}
.right{text-align:right;display:flex;flex-direction:column;align-items:flex-end;gap:10px}
.pills{display:flex;gap:8px}
.pill{font-size:13px;color:#cdd7ea;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);padding:6px 13px;border-radius:100px}
.url{font-size:15px;color:#7E8DA8;font-weight:600}
</style></head>
<body>
<div class="grid"></div><div class="glow"></div>
<div class="wrap">
  <div class="left">
    <div class="logo">Contex<span>Ai</span> Group</div>
    <div class="tag"><b>Intelligence in Context.</b> &nbsp;Strategic advisory + Agentic AI for Pakistan &amp; emerging markets.</div>
  </div>
  <div class="right">
    <div class="pills"><div class="pill">Advisory</div><div class="pill">Dispute Resolution</div><div class="pill">Agentic AI</div></div>
    <div class="url">contexai.org</div>
  </div>
</div>
</body></html>
